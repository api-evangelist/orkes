naftiko: 1.0.0-alpha2
info:
  label: Orkes Conductor REST API — Authentication
  description: 'Orkes Conductor REST API — Authentication. 1 operations. Lead operation: Generate access token. Self-contained
    Naftiko capability covering one Orkes business surface.'
  tags:
  - Orkes
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORKES_API_KEY: ORKES_API_KEY
capability:
  consumes:
  - type: http
    namespace: conductor-authentication
    baseUri: ''
    description: Orkes Conductor REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: token
      path: /token
      operations:
      - name: generatetoken
        method: POST
        description: Generate access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ORKES_API_KEY}}'
  exposes:
  - type: rest
    namespace: conductor-authentication-rest
    port: 8080
    description: REST adapter for Orkes Conductor REST API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/token
      name: token
      description: REST surface for token.
      operations:
      - method: POST
        name: generatetoken
        description: Generate access token
        call: conductor-authentication.generatetoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conductor-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orkes Conductor REST API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: generate-access-token
      description: Generate access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-authentication.generatetoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
