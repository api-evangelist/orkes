naftiko: 1.0.0-alpha2
info:
  label: Orkes Conductor REST API — Secrets
  description: 'Orkes Conductor REST API — Secrets. 4 operations. Lead operation: List secret names. Self-contained Naftiko
    capability covering one Orkes business surface.'
  tags:
  - Orkes
  - Secrets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORKES_API_KEY: ORKES_API_KEY
capability:
  consumes:
  - type: http
    namespace: conductor-secrets
    baseUri: ''
    description: Orkes Conductor REST API — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: secrets
      path: /secrets
      operations:
      - name: listsecrets
        method: GET
        description: List secret names
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: secrets-key
      path: /secrets/{key}
      operations:
      - name: getsecret
        method: GET
        description: Get a secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
      - name: putsecret
        method: PUT
        description: Create or update a secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesecret
        method: DELETE
        description: Delete a secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ORKES_API_KEY}}'
  exposes:
  - type: rest
    namespace: conductor-secrets-rest
    port: 8080
    description: REST adapter for Orkes Conductor REST API — Secrets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/secrets
      name: secrets
      description: REST surface for secrets.
      operations:
      - method: GET
        name: listsecrets
        description: List secret names
        call: conductor-secrets.listsecrets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets/{key}
      name: secrets-key
      description: REST surface for secrets-key.
      operations:
      - method: GET
        name: getsecret
        description: Get a secret
        call: conductor-secrets.getsecret
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putsecret
        description: Create or update a secret
        call: conductor-secrets.putsecret
        with:
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesecret
        description: Delete a secret
        call: conductor-secrets.deletesecret
        with:
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conductor-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orkes Conductor REST API — Secrets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-secret-names
      description: List secret names
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-secrets.listsecrets
      outputParameters:
      - type: object
        mapping: $.
    - name: get-secret
      description: Get a secret
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-secrets.getsecret
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-secret
      description: Create or update a secret
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: conductor-secrets.putsecret
      with:
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-secret
      description: Delete a secret
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: conductor-secrets.deletesecret
      with:
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
