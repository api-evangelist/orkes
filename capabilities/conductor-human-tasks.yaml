naftiko: 1.0.0-alpha2
info:
  label: Orkes Conductor REST API — Human Tasks
  description: 'Orkes Conductor REST API — Human Tasks. 5 operations. Lead operation: Search human tasks. Self-contained Naftiko
    capability covering one Orkes business surface.'
  tags:
  - Orkes
  - Human Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORKES_API_KEY: ORKES_API_KEY
capability:
  consumes:
  - type: http
    namespace: conductor-human-tasks
    baseUri: ''
    description: Orkes Conductor REST API — Human Tasks business capability. Self-contained, no shared references.
    resources:
    - name: human-tasks-search
      path: /human/tasks/search
      operations:
      - name: searchhumantasks
        method: GET
        description: Search human tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: integer
        - name: size
          in: query
          type: integer
        - name: query
          in: query
          type: string
    - name: human-tasks-taskId
      path: /human/tasks/{taskId}
      operations:
      - name: gethumantask
        method: GET
        description: Get a human task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
    - name: human-tasks-taskId-claim-userId
      path: /human/tasks/{taskId}/claim/{userId}
      operations:
      - name: claimhumantask
        method: POST
        description: Claim a human task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
        - name: userId
          in: path
          type: string
          required: true
    - name: human-tasks-taskId-complete
      path: /human/tasks/{taskId}/complete
      operations:
      - name: completehumantask
        method: POST
        description: Complete a human task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: human-tasks-taskId-release
      path: /human/tasks/{taskId}/release
      operations:
      - name: releasehumantask
        method: POST
        description: Release a human task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ORKES_API_KEY}}'
  exposes:
  - type: rest
    namespace: conductor-human-tasks-rest
    port: 8080
    description: REST adapter for Orkes Conductor REST API — Human Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/human/tasks/search
      name: human-tasks-search
      description: REST surface for human-tasks-search.
      operations:
      - method: GET
        name: searchhumantasks
        description: Search human tasks
        call: conductor-human-tasks.searchhumantasks
        with:
          start: rest.start
          size: rest.size
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/human/tasks/{taskid}
      name: human-tasks-taskid
      description: REST surface for human-tasks-taskId.
      operations:
      - method: GET
        name: gethumantask
        description: Get a human task
        call: conductor-human-tasks.gethumantask
        with:
          taskId: rest.taskId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/human/tasks/{taskid}/claim/{userid}
      name: human-tasks-taskid-claim-userid
      description: REST surface for human-tasks-taskId-claim-userId.
      operations:
      - method: POST
        name: claimhumantask
        description: Claim a human task
        call: conductor-human-tasks.claimhumantask
        with:
          taskId: rest.taskId
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/human/tasks/{taskid}/complete
      name: human-tasks-taskid-complete
      description: REST surface for human-tasks-taskId-complete.
      operations:
      - method: POST
        name: completehumantask
        description: Complete a human task
        call: conductor-human-tasks.completehumantask
        with:
          taskId: rest.taskId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/human/tasks/{taskid}/release
      name: human-tasks-taskid-release
      description: REST surface for human-tasks-taskId-release.
      operations:
      - method: POST
        name: releasehumantask
        description: Release a human task
        call: conductor-human-tasks.releasehumantask
        with:
          taskId: rest.taskId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conductor-human-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orkes Conductor REST API — Human Tasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-human-tasks
      description: Search human tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-human-tasks.searchhumantasks
      with:
        start: tools.start
        size: tools.size
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: get-human-task
      description: Get a human task
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-human-tasks.gethumantask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
        mapping: $.
    - name: claim-human-task
      description: Claim a human task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-human-tasks.claimhumantask
      with:
        taskId: tools.taskId
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: complete-human-task
      description: Complete a human task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-human-tasks.completehumantask
      with:
        taskId: tools.taskId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: release-human-task
      description: Release a human task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-human-tasks.releasehumantask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
        mapping: $.
